<?xml version="1.0"?>
<?xml-stylesheet href="styles.css" type="text/css"?>
<window
  id="paper-translation-popup"
  title="翻译选中文本"
  orient="vertical"
  persist="screenX screenY width height"
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml">
  <script src="translator.js" />
  <script src="popup.js" />

  <vbox class="popup-root">
    <label class="section-label" value="选中文本" />
    <html:textarea id="selected-text" class="text-box selected" readonly="readonly" />
    <label id="context-note" class="context-note" value="" />

    <hbox class="toolbar">
      <button id="translate-button" label="翻译" />
      <label id="status" class="status" value="请选择论文中的文字后点击翻译。" />
    </hbox>

    <label class="section-label" value="翻译结果" />
    <html:textarea id="translation-result" class="text-box result" readonly="readonly" />
  </vbox>
</window>
